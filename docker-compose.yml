services:
  db:
    image: postgres
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chronos
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql
  redis:
    image: redis
    restart: always
    ports:
      - 6379:6379

volumes:
  postgres_data:
